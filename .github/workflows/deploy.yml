name: Deploy Backend to EC2 K3s

on:
  push:
    branches:
      - develop
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 774023531956.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: streamly-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Clean up old ECR images
      run: |
        # 최신 5개 이미지만 유지하고 나머지 삭제
        IMAGE_IDS=$(aws ecr describe-images \
          --repository-name ${{ env.ECR_REPOSITORY }} \
          --query 'sort_by(imageDetails,& imagePushedAt)[:-5].[imageDigest]' \
          --output text)
        
        if [ ! -z "$IMAGE_IDS" ]; then
          echo "Deleting old images..."
          echo "$IMAGE_IDS" | while read digest; do
            aws ecr batch-delete-image \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --image-ids imageDigest=$digest
          done
          echo "✅ Old images deleted"
        else
          echo "No old images to delete"
        fi

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_REGISTRY,ECR_REPOSITORY,GITHUB_SHA,AWS_REGION
        script: |
          # ECR 로그인
          aws ecr get-login-password --region ${AWS_REGION} | \
            docker login --username AWS --password-stdin ${ECR_REGISTRY}
          
          # 이미지 태그
          IMAGE_TAG="${GITHUB_SHA}"
          NEW_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          
          echo "Deploying backend: ${NEW_IMAGE}"
          
          # K8s Deployment 업데이트
          kubectl set image deployment/streamly-backend \
            backend=${NEW_IMAGE} \
            --record
          
          # 배포 완료 대기 (5분 타임아웃)
          kubectl rollout status deployment/streamly-backend --timeout=5m
          
          # 배포 확인
          kubectl get pods -l app=streamly-backend
          
          # 이전 이미지 정리 (24시간 이상 된 이미지)
          docker image prune -af --filter "until=24h"
          
          echo "✅ Backend deployment completed!"

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Health check
          sleep 10
          curl -f https://streamlyai.store/api/actuator/health || exit 1
          echo "✅ Backend health check passed!"

    - name: Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "❌ Deployment failed! Rolling back..."
          kubectl rollout undo deployment/streamly-backend
          kubectl rollout status deployment/streamly-backend --timeout=3m
          echo "⏪ Backend rollback completed!"

    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Backend deployment successful!"
          echo "🔗 API: https://streamlyai.store/api"
          echo "📝 Commit: ${{ github.sha }}"
        else
          echo "❌ Backend deployment failed!"
        fi
