version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: streamly-rabbitmq
    ports:
      - "5672:5672"    # AMQP 포트
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - streamly-network

volumes:
  rabbitmq_data:

networks:
  streamly-network:
    driver: bridge
